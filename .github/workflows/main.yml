name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          VITE_WEATHER_API_KEY: ${{ secrets.VITE_WEATHER_API_KEY }}

      - name: Run tests and calculate coverage
        run: npm run test -- --coverage

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' # Only run on PRs
    timeout-minutes: 5

    # Required permission to read dependency graph
    permissions:
      contents: read
      pull-requests: write # To comment on PRs

    steps:
      - uses: actions/checkout@v4

      # Scans PR for risky dependency changes (malicious packages, vulnerabilities)
      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high # Fail PR if high/critical vulnerabilities found
          comment-summary-in-pr: always # Post results as PR comment
